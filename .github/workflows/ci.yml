name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry-core
          pip install -e .
          pip install "pytest>=8.3.0" "pytest-asyncio>=0.24.0"

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check src/ tests/
        continue-on-error: true

      - name: Run unit tests
        run: pytest tests/ -v --tb=short

      - name: Run eval (DummyLLM, no API key needed)
        run: python -m scripts.run_eval --provider dummy
        continue-on-error: true

      - name: Run design tradeoff benchmarks
        run: python -m scripts.benchmark_tradeoffs
        continue-on-error: true
